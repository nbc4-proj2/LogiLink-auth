version: "3.9"
services:
  user-db:
    image: postgres:17
    container_name: user-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 12345678
      POSTGRES_DB: logilink_user
    ports:
      - "5432:5432"
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    restart: always

  slack-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: user-service
    ports:
      - "19092:19092"
    environment:
      DB_HOST: user-db
      DB_PORT: 5432
      DB_NAME: logilink_user
      DB_USERNAME: postgres
      DB_PASSWORD: 12345678
      SERVER_PORT: 19092
    depends_on:
      - user-db
    restart: always