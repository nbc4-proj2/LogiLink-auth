server:
  port: 19092


eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:19090/eureka/
  instance:
    hostname: user-service

spring:
  application:
    name: user-service

  datasource:
    url: jdbc:postgresql://localhost:5432/${DATABASE_NAME}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true


logging:
  level:
    org.springframework.cloud.openfeign: DEBUG
    org.springframework.web: DEBUG

##### JWT #####
jwt:
  secret:
    key: ${JWT_SECRET_KEY}
  access:
    token:
      expire:
        master: 1800000
        others: 3600000
  refresh:
    token:
      expire:
        master: 259200000
        others: 604800000

##### Master Login #####
login:
  master:
    key: ${LOGIN_MASTER_KEY}
