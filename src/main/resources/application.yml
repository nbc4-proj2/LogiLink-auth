spring:
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
  config:
    import: optional:file:.env[.properties]

jwt:
  secret:
    key: ${JWT_SECRET_KEY}
  access:
    token:
      expire: 3600000

login:
  master:
    key: ${LOGIN_MASTER_KEY}